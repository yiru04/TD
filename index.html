<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Desk Reports</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0d1117;
      --s1:#161b22;
      --b1:#30363d;
      --t1:#e6edf3;
      --t2:#b1bac4;
      --bl:#58a6ff;
      --g:#3fb950;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'JetBrains Mono',monospace;
      background:linear-gradient(135deg,#0d1117 0%,#111827 55%,#0a1628 100%);
      color:var(--t1);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{
      width:min(920px,100%);
      background:rgba(22,27,34,.92);
      border:1px solid var(--b1);
      border-radius:18px;
      padding:40px 36px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .logo{
      font-family:'Syne',sans-serif;
      font-size:28px;
      font-weight:800;
      margin-bottom:10px;
      background:linear-gradient(135deg,var(--bl),var(--g));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .sub{
      color:var(--t2);
      font-size:13px;
      line-height:1.8;
      margin-bottom:28px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    .card{
      display:block;
      text-decoration:none;
      color:inherit;
      background:#0f1722;
      border:1px solid var(--b1);
      border-radius:16px;
      padding:24px 22px;
      transition:.18s ease;
    }
    .card:hover{
      transform:translateY(-2px);
      border-color:#58a6ff;
      box-shadow:0 10px 30px rgba(88,166,255,.12);
    }
    .tag{
      display:inline-block;
      font-size:11px;
      padding:4px 10px;
      border-radius:999px;
      margin-bottom:16px;
      border:1px solid var(--b1);
      color:var(--t2);
    }
    .title{
      font-size:20px;
      font-weight:700;
      margin-bottom:10px;
    }
    .desc{
      font-size:12px;
      color:var(--t2);
      line-height:1.8;
    }
    @media (max-width: 720px){
      .grid{grid-template-columns:1fr}
      .wrap{padding:28px 20px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">◈ TRADING DESK</div>
    <div class="sub">
      選擇要開啟的版本。<br>
      原始版保留你原本 GitHub 上的 dashboard，改版版則是新的 report。
    </div>

    <div class="grid">
      <a class="card" href="/dashboard">
        <div class="tag">Original</div>
        <div class="title">原始版本</div>
        <div class="desc">開啟你原本 GitHub repo 裡的那份 dashboard。</div>
      </a>

      <a class="card" href="/report_v4">
        <div class="tag">Updated</div>
        <div class="title">改版報告</div>
        <div class="desc">開啟這次整理過版面的完整報告版本。</div>
      </a>
    </div>
  </div>
</body>
</html>
